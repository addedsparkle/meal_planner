name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript build
        run: npm run build -w backend

      - name: Run tests
        run: npm test -w backend

  check-generated:
    name: Generated files up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate OpenAPI spec
        run: npm run generate:spec -w backend

      - name: Generate frontend types
        run: npm run generate:types -w frontend

      - name: Fail if generated files differ from committed
        run: git diff --exit-code -- backend/openapi.json frontend/src/lib/generated/api-types.ts

  frontend-check:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript + Vite build
        run: npm run build -w frontend

      - name: ESLint
        run: npm run lint -w frontend

      - name: Storybook build
        run: npm run build-storybook -w frontend
